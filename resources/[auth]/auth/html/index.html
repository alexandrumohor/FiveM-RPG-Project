<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-container" class="hidden">
        <div class="auth-card">
            <div class="auth-header">
                <h1>RPG Server</h1>
                <p class="subtitle">Autentificare</p>
            </div>

            <div class="tabs">
                <button class="tab active" data-tab="login">Login</button>
                <button class="tab" data-tab="register">Register</button>
            </div>

            <div id="message" class="message hidden"></div>

            <form id="login-form" class="auth-form">
                <div class="input-group">
                    <label for="login-username">Username</label>
                    <input type="text" id="login-username" name="username" autocomplete="off" required>
                </div>
                <div class="input-group">
                    <label for="login-password">Parolă</label>
                    <input type="password" id="login-password" name="password" required>
                </div>
                <button type="submit" class="btn-submit">Conectează-te</button>
            </form>

            <form id="register-form" class="auth-form hidden">
                <div class="input-group">
                    <label for="reg-username">Username</label>
                    <input type="text" id="reg-username" name="username" autocomplete="off"
                           placeholder="Lasă gol pentru a folosi numele FiveM">
                </div>
                <div class="input-group">
                    <label for="reg-email">Email</label>
                    <input type="email" id="reg-email" name="email" autocomplete="off"
                           placeholder="Opțional">
                </div>
                <div class="input-group">
                    <label for="reg-password">Parolă</label>
                    <input type="password" id="reg-password" name="password" required>
                </div>
                <div class="input-group">
                    <label for="reg-confirm">Confirmă parola</label>
                    <input type="password" id="reg-confirm" name="confirmPassword" required>
                </div>
                <button type="submit" class="btn-submit">Creează cont</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
